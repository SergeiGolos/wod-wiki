<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wod.Wiki TV</title>
    <!-- Google Cast Application Framework — Receiver SDK (must be HTTPS) -->
    <script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: white; overflow: hidden; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
        .timer-ring { transition: stroke-dashoffset 0.1s linear; }
        .pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .2; } }
    </style>
</head>
<body tabindex="0" id="app-body" class="h-screen w-screen flex flex-row overflow-hidden">
    <!-- Left Panel: Workout Info (Mirrors VisualStatePanel) -->
    <div class="w-1/2 h-full border-r border-white/10 flex flex-col p-16 justify-center bg-zinc-950">
        <div class="opacity-20 text-xs tracking-[0.5em] uppercase mb-12 font-bold">Workout Stack</div>
        <div id="exercise-label" class="text-7xl font-black tracking-tighter uppercase leading-tight text-white/90">
            Ready to Start
        </div>
        <div id="sub-label" class="mt-8 text-2xl text-blue-500/60 font-medium tracking-wide">
            Waiting for Cast session...
        </div>
    </div>

    <!-- Right Panel: Big Clock (Mirrors TimerDisplay) -->
    <div class="w-1/2 h-full flex flex-col items-center justify-center bg-black relative">
        <svg class="absolute w-[80%] h-[80%] -rotate-90 scale-95" viewBox="0 0 100 100">
            <circle cx="50" cy="50" r="48" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1" />
            <circle id="progress-ring" cx="50" cy="50" r="48" fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="301.59" stroke-dashoffset="301.59" stroke-linecap="round" class="timer-ring" />
        </svg>
        <div id="timer-display" class="text-[14vw] font-black tracking-tighter tabular-nums leading-none z-10">00:00</div>
        
        <div class="absolute bottom-8 right-8 flex items-center gap-3 opacity-20">
            <div id="connection-dot" class="w-1.5 h-1.5 rounded-full bg-emerald-500 shadow-[0_0_8px_#10b981]"></div>
            <div class="text-[10px] tracking-widest font-bold uppercase">WOD.WIKI // SMART MIRROR</div>
        </div>
    </div>

    <script type="module">
        // ====================================================================
        // 1. Start CAF Receiver Context FIRST — the Chromecast will time out
        //    (~5 s) and show "failed to cast" if context.start() isn't called.
        //    Custom namespaces MUST be declared in the start options or the
        //    Cast framework will reject all messages on that namespace.
        // ====================================================================

        const CAST_NAMESPACE = 'urn:x-cast:com.wodwiki';
        const context = cast.framework.CastReceiverContext.getInstance();

        // ── DOM refs ────────────────────────────────────────────────────

        const labelEl    = document.getElementById('exercise-label');
        const subLabelEl = document.getElementById('sub-label');
        const timerEl    = document.getElementById('timer-display');
        const ringEl     = document.getElementById('progress-ring');
        const dotEl      = document.getElementById('connection-dot');

        let lastState = null;
        let dcRef = null; // RTCDataChannel
        let senderIdRef = null;

        // ====================================================================
        // 2. Create WebRTC PeerConnection (answerer) — must exist before the
        //    signaling listener fires so we can handle the offer immediately.
        // ====================================================================

        const pc = new RTCPeerConnection({ iceServers: [] }); // LAN-only

        pc.onicecandidate = (event) => {
            if (event.candidate && senderIdRef) {
                context.sendCustomMessage(CAST_NAMESPACE, senderIdRef,
                    { type: 'webrtc-ice', candidate: event.candidate.toJSON() });
            }
        };

        pc.ondatachannel = (event) => {
            console.log('[Receiver] DataChannel arrived');
            dcRef = event.channel;
            wireDataChannel(dcRef);
        };

        pc.onconnectionstatechange = () => {
            const state = pc.connectionState;
            console.log('[Receiver] PeerConnection state:', state);
            dotEl.style.background = state === 'connected' ? '#10b981' : '#ef4444';
        };

        // ====================================================================
        // 3. Register signaling listener (before start so we don't miss msgs)
        // ====================================================================

        context.addCustomMessageListener(CAST_NAMESPACE, (event) => {
            console.log('[Receiver] Cast message from', event.senderId, event.data);
            senderIdRef = event.senderId;
            // With 'JSON' namespace type, event.data is already a parsed object.
            // Keep the string fallback for safety.
            const signal = typeof event.data === 'string' ? JSON.parse(event.data) : event.data;
            handleSignal(signal);
        });

        // ====================================================================
        // 4. NOW call context.start() with the custom namespace declared.
        //    Use 'JSON' type so the Cast SDK auto-parses incoming messages
        //    as objects and we send objects directly (no manual stringify).
        // ====================================================================

        try {
            context.start({
                customNamespaces: {
                    [CAST_NAMESPACE]: 'JSON'
                }
            });
            console.log('[Receiver] CAF Receiver Context started with namespace:', CAST_NAMESPACE);
            subLabelEl.innerText = 'Cast ready — waiting for sender…';
        } catch (err) {
            console.error('[Receiver] context.start() failed:', err);
            subLabelEl.innerText = 'Error: ' + err.message;
        }

        async function handleSignal(signal) {
            try {
                if (signal.type === 'webrtc-offer') {
                    await pc.setRemoteDescription({ type: 'offer', sdp: signal.sdp });
                    const answer = await pc.createAnswer();
                    await pc.setLocalDescription(answer);
                    context.sendCustomMessage(CAST_NAMESPACE, senderIdRef, {
                        type: 'webrtc-answer',
                        sdp: pc.localDescription.sdp,
                    });
                } else if (signal.type === 'webrtc-answer') {
                    await pc.setRemoteDescription({ type: 'answer', sdp: signal.sdp });
                } else if (signal.type === 'webrtc-ice') {
                    await pc.addIceCandidate(signal.candidate);
                }
            } catch (err) {
                console.error('[Receiver] Signal error', err);
            }
        }

        // ── DataChannel handling ────────────────────────────────────────

        function wireDataChannel(dc) {
            dc.onopen = () => {
                console.log('[Receiver] DataChannel open — ready');
                subLabelEl.innerText = 'Connected';
            };
            dc.onclose = () => {
                console.log('[Receiver] DataChannel closed');
                subLabelEl.innerText = 'Disconnected';
            };
            dc.onmessage = (event) => {
                const msg = JSON.parse(event.data);
                if (msg.type === 'state-update') {
                    lastState = msg.payload.displayState;

                    // Instant update for static text
                    const primary = lastState.timerStack?.[0] || {};
                    labelEl.innerText = primary.label || 'Workout';
                    subLabelEl.innerText = lastState.workoutState === 'running' ? 'Active Effort' : 'Paused';
                }
            };
        }

        // ── Send event back to sender via DataChannel ───────────────────

        let msgCounter = 0;

        function sendReceiverEvent(eventName) {
            if (!dcRef || dcRef.readyState !== 'open') return;
            dcRef.send(JSON.stringify({
                type: 'event-from-receiver',
                messageId: 'evt-' + (++msgCounter),
                timestamp: Date.now(),
                payload: {
                    event: { name: eventName, timestamp: Date.now() }
                }
            }));
        }

        // ── Timer interpolation (unchanged) ─────────────────────────────

        const calcElapsed = (spans, now) => {
            if (!spans || !spans.length) return 0;
            return spans.reduce((total, s) => total + Math.max(0, (s.ended ?? now) - s.started), 0);
        };

        const tick = () => {
            if (lastState) {
                const primary = lastState.timerStack?.[0] || {};
                const isRunning = lastState.workoutState === 'running';
                const now = Date.now();
                const elapsed = calcElapsed(primary.spans, now);

                let timeToShow = elapsed;
                if (primary.format === 'down' && primary.durationMs) {
                    timeToShow = Math.max(0, primary.durationMs - elapsed);
                    const progress = (timeToShow / primary.durationMs);
                    ringEl.style.strokeDashoffset = 301.59 * (1 - progress);
                } else {
                    ringEl.style.strokeDashoffset = isRunning ? 0 : 301.59;
                }

                const seconds = Math.floor(timeToShow / 1000);
                const mm = Math.floor(seconds / 60).toString().padStart(2, '0');
                const ss = (seconds % 60).toString().padStart(2, '0');
                timerEl.innerText = `${mm}:${ss}`;
                timerEl.style.opacity = isRunning ? "1" : "0.4";
            }
            requestAnimationFrame(tick);
        };

        // ── Focus management for Chromecast D-Pad ──────────────────────

        const appBody = document.getElementById('app-body');
        appBody.focus();
        appBody.addEventListener('blur', () => {
            setTimeout(() => appBody.focus(), 100);
        });

        // ── D-Pad key handler ───────────────────────────────────────────

        const flashOverlay = document.createElement('div');
        flashOverlay.id = 'dpad-flash';
        flashOverlay.style.cssText = 'position:fixed;inset:0;background:rgba(59,130,246,0.08);pointer-events:none;opacity:0;transition:opacity 0.15s;z-index:9999';
        document.body.appendChild(flashOverlay);

        const flashFeedback = () => {
            flashOverlay.style.opacity = '1';
            setTimeout(() => { flashOverlay.style.opacity = '0'; }, 200);
        };

        window.addEventListener('keydown', (e) => {
            switch (e.key) {
                case 'Enter':
                    e.preventDefault();
                    sendReceiverEvent('next');
                    flashFeedback();
                    subLabelEl.innerText = '⏭ Next...';
                    setTimeout(() => { if (lastState) subLabelEl.innerText = lastState.workoutState === 'running' ? 'Active Effort' : 'Paused'; }, 800);
                    break;
                case 'ArrowUp':
                    e.preventDefault();
                    sendReceiverEvent('start');
                    flashFeedback();
                    break;
                case 'ArrowDown':
                    e.preventDefault();
                    sendReceiverEvent('pause');
                    flashFeedback();
                    break;
                case 'Escape':
                case 'Backspace':
                    e.preventDefault();
                    sendReceiverEvent('stop');
                    flashFeedback();
                    break;
            }
        });

        // ── Start timer loop ─────────────────────────────────────────

        tick();
    </script>
</body>
</html>
