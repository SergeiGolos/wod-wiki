<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wod.Wiki TV</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: white; overflow: hidden; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
        .timer-ring { transition: stroke-dashoffset 0.1s linear; }
        .pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .3; } }
    </style>
</head>
<body class="h-screen w-screen flex flex-col items-center justify-center p-12">
    <div id="root" class="w-full h-full flex flex-col items-center justify-between">
        <div id="exercise-label" class="text-5xl font-black tracking-tight text-white/90 uppercase mt-8 text-center transition-all duration-500">
            Ready to Start
        </div>

        <div class="relative w-[32rem] h-[80vh] flex items-center justify-center">
            <svg class="absolute inset-0 w-full h-full -rotate-90 scale-90" viewBox="0 0 100 100">
                <circle cx="50" cy="50" r="48" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1" />
                <circle id="progress-ring" cx="50" cy="50" r="48" fill="none" stroke="#3b82f6" stroke-width="2" stroke-dasharray="301.59" stroke-dashoffset="301.59" stroke-linecap="round" class="timer-ring" />
            </svg>
            <div id="timer-display" class="text-[12rem] font-black tracking-tighter tabular-nums leading-none">00:00</div>
        </div>

        <div class="mb-8 flex flex-col items-center gap-2">
            <div id="sub-label" class="text-xl font-medium text-white/20 tracking-widest uppercase mb-4">Wod.Wiki // Smart Receiver</div>
            <div id="connection-dot" class="w-2 h-2 rounded-full bg-emerald-500 shadow-[0_0_10px_#10b981]"></div>
        </div>
    </div>

    <script type="module">
        import { v4 as uuidv4 } from 'https://jspm.dev/uuid';

        const params = new URLSearchParams(window.location.search);
        const relay = params.get('relay');
        const session = params.get('session');
        const deviceId = 'tv-' + Math.random().toString(36).substr(2, 4);

        const labelEl = document.getElementById('exercise-label');
        const timerEl = document.getElementById('timer-display');
        const ringEl = document.getElementById('progress-ring');

        let lastState = null;
        let lastUpdateReceivedAt = 0;

        const connect = () => {
            const ws = new WebSocket(relay);
            ws.onopen = () => ws.send(JSON.stringify({
                type: 'register', messageId: uuidv4(), sessionId: session || undefined,
                timestamp: Date.now(), payload: { clientType: 'receiver', clientId: deviceId }
            }));

            ws.onmessage = (event) => {
                const msg = JSON.parse(event.data);
                if (msg.type === 'state-update') {
                    lastState = msg.payload.displayState;
                    lastUpdateReceivedAt = Date.now();
                    updateMetadata();
                }
            };
            ws.onclose = () => setTimeout(connect, 3000);
        };

        const updateMetadata = () => {
            if (!lastState) return;
            const primary = lastState.timerStack?.[0] || {};
            labelEl.innerText = primary.label || 'Workout';
            
            if (lastState.workoutState === 'running') {
                timerEl.classList.remove('opacity-50');
                ringEl.classList.add('pulse');
            } else {
                timerEl.classList.add('opacity-50');
                ringEl.classList.remove('pulse');
            }
        };

        const tick = () => {
            if (lastState) {
                const primary = lastState.timerStack?.[0] || {};
                const isRunning = lastState.workoutState === 'running';
                
                // Calculate live elapsed time locally
                let elapsed = lastState.totalElapsedMs || 0;
                if (isRunning) {
                    elapsed += (Date.now() - lastUpdateReceivedAt);
                }

                // Format Timer
                let timeToShow = elapsed;
                if (primary.format === 'down' && primary.durationMs) {
                    const accumulated = (primary.accumulatedMs || 0) + (isRunning ? (Date.now() - lastUpdateReceivedAt) : 0);
                    timeToShow = Math.max(0, primary.durationMs - accumulated);
                    
                    const progress = (timeToShow / primary.durationMs);
                    ringEl.style.strokeDashoffset = 301.59 * (1 - progress);
                } else {
                    ringEl.style.strokeDashoffset = isRunning ? 0 : 301.59;
                }

                const seconds = Math.floor(timeToShow / 1000);
                const mm = Math.floor(seconds / 60).toString().padStart(2, '0');
                const ss = (seconds % 60).toString().padStart(2, '0');
                timerEl.innerText = `${mm}:${ss}`;
            }
            requestAnimationFrame(tick);
        };

        connect();
        tick();
    </script>
</body>
</html>
