<!-- shared nav + theme toggle, inlined into each POC so the pages are self-contained -->
<script>
  (function () {
    // Restore theme from localStorage before paint
    var t = localStorage.getItem('poc-theme');
    if (t === 'dark') document.documentElement.classList.add('dark');

    document.addEventListener('click', function (e) {
      var t = e.target.closest('[data-theme-toggle]');
      if (t) {
        var on = document.documentElement.classList.toggle('dark');
        t.setAttribute('aria-checked', on ? 'true' : 'false');
        localStorage.setItem('poc-theme', on ? 'dark' : 'light');
        return;
      }
      var tab = e.target.closest('[role="tab"]');
      if (tab) {
        var tabs = tab.parentElement.querySelectorAll('[role="tab"]');
        tabs.forEach(function (b) { b.setAttribute('aria-selected', 'false'); });
        tab.setAttribute('aria-selected', 'true');

        var group = tab.getAttribute('data-group') || 'plan';
        var target = tab.getAttribute('data-target') || 'plan';
        // per-group highlighting
        var root = document.querySelector('[data-tabs-root="' + group + '"]') || document;
        root.querySelectorAll('[data-tab-panel]').forEach(function (p) {
          p.hidden = p.getAttribute('data-tab-panel') !== target;
        });
        // code line highlight
        root.querySelectorAll('[data-highlight]').forEach(function (el) {
          el.classList.remove('highlight');
        });
        root.querySelectorAll('[data-highlight="' + target + '"]').forEach(function (el) {
          el.classList.add('highlight');
        });
      }
    });
  })();
</script>
