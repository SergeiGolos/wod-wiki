<!DOCTYPE html>
<html lang="en" class="antialiased lg:bg-zinc-100 dark:bg-zinc-900 dark:lg:bg-zinc-950">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wod.Wiki Playground</title>
  <link rel="icon" type="image/png" href="/images/wod-wiki-logo-light.png" />
  <link rel="stylesheet" href="https://rsms.me/inter/inter.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/geist@1/dist/fonts/geist-mono/style.css">
</head>

<body class="min-h-svh w-full bg-white dark:bg-zinc-900">
  <script>
    // Restore path stored by 404.html (GitHub Pages SPA routing)
    (function () {
      var r = sessionStorage.getItem('spa-redirect');
      if (r) {
        sessionStorage.removeItem('spa-redirect');
        history.replaceState(null, '', r.replace(location.origin, '') || '/');
      }
    })();
  </script>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
