<!DOCTYPE html>
<html lang="en" class="antialiased lg:bg-zinc-100 dark:bg-zinc-900 dark:lg:bg-zinc-950">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wod.Wiki Playground</title>
  <link rel="icon" type="image/png" href="%BASE_URL%images/wod-wiki-logo-light.png" />
  <link rel="stylesheet" href="https://rsms.me/inter/inter.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/jetbrains-mono@5/index.css">
  <!-- Google tag (gtag.js) -->
  <!-- Dev placeholder G-PROD-ID is replaced during production build -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-PROD-ID"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-PROD-ID');
  </script>
</head>

<body class="min-h-svh w-full bg-white dark:bg-zinc-900">
  <script>
    // Restore path stored by 404.html (GitHub Pages SPA routing)
    (function () {
      var r = sessionStorage.getItem('spa-redirect');
      if (r) {
        sessionStorage.removeItem('spa-redirect');
        history.replaceState(null, '', r.replace(location.origin, '') || '/');
      }
    })();
  </script>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
