name: Preview E2E

on:
  workflow_call:
    inputs:
      preview-url:
        description: Preview base URL to test
        required: false
        type: string
        default: https://preview.wod.wiki
  workflow_dispatch:
    inputs:
      preview-url:
        description: Preview base URL to test
        required: false
        default: https://preview.wod.wiki

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  preview-e2e:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.x

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bun x playwright install --with-deps chromium

      - name: Run preview E2E
        run: bun x playwright test --config playwright.preview.config.ts
        env:
          CI: true
          PLAYWRIGHT_BASE_URL: ${{ inputs.preview-url || 'https://preview.wod.wiki' }}

      - name: Upload Playwright HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: preview-playwright-report
          path: playwright-report/
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload E2E screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: preview-e2e-screenshots
          path: test-results/
          if-no-files-found: ignore
          retention-days: 14

      - name: Write preview summary
        if: always()
        run: |
          cat <<EOF >> "$GITHUB_STEP_SUMMARY"
          ## Preview E2E summary

          - Preview URL: ${{ inputs.preview-url || 'https://preview.wod.wiki' }}
          EOF
