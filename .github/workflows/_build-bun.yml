name: build-bun
on:
  workflow_call:
    inputs:
      version:
        description: "The version for the package"
        required: true
        type: string

# Add permissions needed for npm provenance
permissions:
  contents: read
  id-token: write

jobs:
  build:
    runs-on: ubuntu-22.04  

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Update version in package.json
        run: |
          bun -e "const pkg=require('./package.json'); pkg.version='${{ inputs.version }}'; require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2))"

      - name: Install dependencies
        run: bun install
    
      - name: Run tests
        run: bun run test
        # TODO: Pass all tests and remove this.
        # Continue on error in case there are test 
        # failures that shouldn't block the build
        continue-on-error: true

      - name: Generate coverage report
        run: bun run test:coverage
        continue-on-error: true

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: |
            coverage/
            !coverage/**/*.tmp
          retention-days: 30

      - name: Replace GA tag in sources
        if: ${{ vars.G_TAG != '' }}
        run: |
          sed -i 's/G-PROD-ID/${{ vars.G_TAG }}/g' index.html
          sed -i 's/G-PROD-ID/${{ vars.G_TAG }}/g' .storybook/preview-head.html

      - name: Validate Cast App ID for production builds
        if: ${{ (github.ref_type=='tag' || github.ref_name=='main') && vars.VITE_CAST_APP_ID == '' }}
        run: |
          echo "::error::Missing repository variable VITE_CAST_APP_ID."
          echo "::error::A Custom Receiver App ID is required for Cast namespace signaling."
          exit 1

      - name: Debug Cast App ID wiring
        run: |
          if [ -z "${{ vars.VITE_CAST_APP_ID }}" ]; then
            echo "VITE_CAST_APP_ID is empty in workflow vars context"
          else
            echo "VITE_CAST_APP_ID is set (length=${#VITE_CAST_APP_ID})"
          fi
        env:
          VITE_CAST_APP_ID: ${{ vars.VITE_CAST_APP_ID }}

      - name: Build Storybook
        run: bun run build-storybook
        env:
          # Configure API URL for production build (if used in storybook)
          VITE_API_URL: ${{ vars.VITE_API_URL || 'https://wod.wiki/api' }}
          VITE_CAST_APP_ID: ${{ vars.VITE_CAST_APP_ID }}

      - name: Validate built Cast App ID
        if: ${{ github.ref_type=='tag' || github.ref_name=='main' }}
        run: |
          if [ -z "${{ vars.VITE_CAST_APP_ID }}" ]; then
            echo "::error::VITE_CAST_APP_ID is empty during build validation"
            exit 1
          fi

          if grep -R -F "CC1AD845" storybook-static/assets; then
            echo "::error::Default Cast App ID (CC1AD845) found in build output"
            exit 1
          fi

          if ! grep -R -F "${{ vars.VITE_CAST_APP_ID }}" storybook-static/assets; then
            echo "::error::Custom Cast App ID not found in build output"
            exit 1
          fi

      - name: Upload Build Assets
        uses: actions/upload-artifact@v4
        if: ${{ github.ref_type=='tag' || github.ref_name=='main' }}  
        with:
          name: page
          path: storybook-static
