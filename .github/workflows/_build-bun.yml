name: build-bun
on:
  workflow_call:
    inputs:
      version:
        description: "The version for the package"
        required: true
        type: string

# Add permissions needed for npm provenance
permissions:
  contents: read
  id-token: write

jobs:
  build:
    runs-on: ubuntu-22.04  

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Update version in package.json
        run: |
          bun -e "const pkg=require('./package.json'); pkg.version='${{ inputs.version }}'; require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2))"

      - name: Install dependencies
        run: bun install

      - name: Verify architecture guardrails
        run: bun run check:architecture

      - name: Run tests
        run: bun run test
        # TODO: Pass all tests and remove this.
        # Continue on error in case there are test 
        # failures that shouldn't block the build
        continue-on-error: true

      - name: Generate coverage report
        run: bun run test:coverage
        continue-on-error: true

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: |
            coverage/
            !coverage/**/*.tmp
          retention-days: 30

      - name: Replace GA tag in sources
        if: ${{ vars.G_TAG != '' }}
        run: |
          sed -i 's/G-PROD-ID/${{ vars.G_TAG }}/g' playground/index.html
          sed -i 's/G-PROD-ID/${{ vars.G_TAG }}/g' playground/receiver-rpc.html

      - name: Build App
        run: bun run build:app
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL || 'https://wod.wiki/api' }}
          VITE_CAST_APP_ID: ${{ vars.VITE_CAST_APP_ID }}

      - name: Build Library
        if: ${{ github.ref_type=='tag' || github.ref_name=='main' }}
        run: bun run build-library

      - name: Upload Page Assets
        uses: actions/upload-artifact@v4
        if: ${{ github.ref_type=='tag' || github.ref_name=='main' }}
        with:
          name: page
          path: playground/dist

      - name: Upload Library Assets
        uses: actions/upload-artifact@v4
        if: ${{ github.ref_type=='tag' || github.ref_name=='main' }}
        with:
          name: library
          path: dist
