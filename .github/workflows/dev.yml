name: Delivery – Dev Preview

on:
  push:
    branches: ["dev"]
  workflow_dispatch:
    inputs:
      branch:
        description: Source branch to publish
        required: false
        default: dev

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  verify:
    uses: ./.github/workflows/_verify.yml
    secrets: inherit

  publish-preview:
    needs: [verify]
    if: needs.verify.result == 'success'
    uses: ./.github/workflows/_preview-delivery.yml
    secrets: inherit
    with:
      branch: ${{ github.event_name == 'workflow_dispatch' && inputs.branch || github.ref_name }}
      preview-url: https://preview.wod.wiki

  publish-storybook:
    needs: [verify]
    if: needs.verify.result == 'success'
    runs-on: ubuntu-22.04
    steps:
      - name: Dispatch storybook preview deployment
        uses: actions/github-script@v7
        env:
          SOURCE_BRANCH: ${{ github.event_name == 'workflow_dispatch' && inputs.branch || github.ref_name }}
        with:
          github-token: ${{ secrets.PREVIEW_REPO_PAT }}
          script: |
            const sourceBranch = process.env.SOURCE_BRANCH;
            await github.rest.actions.createWorkflowDispatch({
              owner: 'SergeiGolos',
              repo: 'wod-wiki-storybook',
              workflow_id: 'preview.yml',
              ref: 'main',
              inputs: { branch: sourceBranch },
            });
            core.info(`Dispatched storybook preview for branch ${sourceBranch}`);
