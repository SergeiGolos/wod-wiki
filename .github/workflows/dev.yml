name: Delivery – Dev Preview

on:
  push:
    branches: ["dev"]
  workflow_dispatch:
    inputs:
      branch:
        description: Source branch to publish
        required: false
        default: dev

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  verify:
    uses: ./.github/workflows/_verify.yml
    secrets: inherit

  publish-preview:
    needs: [verify]
    if: needs.verify.result == 'success'
    uses: ./.github/workflows/_preview-delivery.yml
    secrets: inherit
    with:
      branch: ${{ github.event_name == 'workflow_dispatch' && inputs.branch || github.ref_name }}
      preview-url: https://preview.wod.wiki
