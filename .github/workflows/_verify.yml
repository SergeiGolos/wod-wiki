name: Verify

on:
  workflow_call:
    outputs:
      unit-status:
        description: Unit test outcome
        value: ${{ jobs.verify.outputs.unit-status }}
      story-status:
        description: Story test outcome
        value: ${{ jobs.verify.outputs.story-status }}
      coverage-status:
        description: Coverage outcome
        value: ${{ jobs.verify.outputs.coverage-status }}
      build-status:
        description: Playground build outcome
        value: ${{ jobs.verify.outputs.build-status }}

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  verify:
    runs-on: ubuntu-22.04
    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    outputs:
      unit-status: ${{ steps.unit.outcome }}
      story-status: ${{ steps.story.outcome }}
      coverage-status: ${{ steps.coverage.outcome }}
      build-status: ${{ steps.build.outcome }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.x

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bun x playwright install --with-deps chromium

      - name: Run unit tests
        id: unit
        run: bun run test
        continue-on-error: true

      - name: Run story tests
        id: story
        run: bun run test:storybook
        continue-on-error: true
        env:
          CI: true

      - name: Run coverage
        id: coverage
        run: bun run test:coverage
        continue-on-error: true

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload coverage to Codecov
        if: always() && env.CODECOV_TOKEN != '' && steps.coverage.outcome == 'success'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      - name: Replace GA tag in sources
        if: ${{ vars.G_TAG != '' }}
        run: |
          sed -i 's/G-PROD-ID/${{ vars.G_TAG }}/g' playground/index.html
          sed -i 's/G-PROD-ID/${{ vars.G_TAG }}/g' playground/receiver-rpc.html

      - name: Build playground
        id: build
        run: bun run build:app
        continue-on-error: true
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL || 'https://wod.wiki/api' }}
          VITE_CAST_APP_ID: ${{ vars.VITE_CAST_APP_ID }}

      - name: Write verification summary
        if: always()
        run: |
          cat <<EOF >> "$GITHUB_STEP_SUMMARY"
          ## Verification summary

          | Check | Outcome |
          | --- | --- |
          | Unit tests | ${{ steps.unit.outcome }} |
          | Story tests | ${{ steps.story.outcome }} |
          | Coverage | ${{ steps.coverage.outcome }} |
          | Playground build | ${{ steps.build.outcome }} |
          EOF

      - name: Fail if required checks failed
        if: steps.unit.outcome != 'success' || steps.story.outcome != 'success' || steps.build.outcome != 'success'
        run: |
          echo "Required verification failed."
          exit 1
