name: Dispatch Playground Preview

on:
  push:
    branches:
      - dev
  workflow_dispatch:
    inputs:
      branch:
        description: Source branch to preview
        required: false
        default: dev

permissions:
  contents: read

jobs:
  dispatch-preview:
    runs-on: ubuntu-latest
    steps:
      - name: Determine source branch
        id: branch
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            BRANCH="${{ inputs.branch }}"
          else
            BRANCH="dev"
          fi
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "Dispatching preview for $BRANCH"

      - name: Dispatch to wod-wiki-preview
        env:
          PREVIEW_REPO_PAT: ${{ secrets.PREVIEW_REPO_PAT }}
          BRANCH: ${{ steps.branch.outputs.branch }}
        run: |
          curl -sS -X POST \
            -H "Authorization: Bearer $PREVIEW_REPO_PAT" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/SergeiGolos/wod-wiki-preview/dispatches \
            -d "{\"event_type\":\"playground-preview\",\"client_payload\":{\"branch\":\"$BRANCH\"}}"
