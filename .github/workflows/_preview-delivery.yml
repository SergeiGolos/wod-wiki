name: Preview Delivery

on:
  workflow_call:
    inputs:
      branch:
        description: Source branch to publish from wod-wiki
        required: true
        type: string
      preview-url:
        description: Published preview base URL
        required: false
        default: https://preview.wod.wiki
        type: string
    outputs:
      preview-url:
        description: Published preview URL
        value: ${{ jobs.publish-preview.outputs.preview-url }}
      preview-run-url:
        description: Companion repository workflow run URL
        value: ${{ jobs.publish-preview.outputs.preview-run-url }}

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish-preview:
    runs-on: ubuntu-22.04
    outputs:
      preview-url: ${{ steps.dispatch.outputs.preview-url }}
      preview-run-url: ${{ steps.dispatch.outputs.preview-run-url }}
    steps:
      - name: Dispatch companion preview deployment
        id: dispatch
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PREVIEW_REPO_PAT }}
          script: |
            const owner = 'SergeiGolos';
            const repo = 'wod-wiki-preview';
            const workflow_id = 'preview.yml';
            const sourceBranch = '${{ inputs.branch }}';
            const previewUrl = '${{ inputs.preview-url }}';
            const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

            core.info(`Dispatching ${owner}/${repo}:${workflow_id} for source branch ${sourceBranch}`);
            const { data: beforeData } = await github.rest.actions.listWorkflowRuns({
              owner,
              repo,
              workflow_id,
              event: 'workflow_dispatch',
              per_page: 1,
            });
            const latestRunIdBefore = beforeData.workflow_runs[0]?.id ?? 0;
            const dispatchedAt = Date.now();

            await github.rest.actions.createWorkflowDispatch({
              owner,
              repo,
              workflow_id,
              ref: 'main',
              inputs: { branch: sourceBranch },
            });

            let run = null;
            for (let attempt = 1; attempt <= 20; attempt += 1) {
              await sleep(15000);
              const { data } = await github.rest.actions.listWorkflowRuns({
                owner,
                repo,
                workflow_id,
                event: 'workflow_dispatch',
                per_page: 10,
              });

              run = data.workflow_runs.find((candidate) => {
                const createdAt = new Date(candidate.created_at).getTime();
                return candidate.id > latestRunIdBefore && createdAt >= dispatchedAt - 5000;
              });

              if (run) {
                break;
              }
            }

            if (!run) {
              core.setFailed(`Unable to find a ${workflow_id} run in ${owner}/${repo} after dispatch.`);
              return;
            }

            const runUrl = run.html_url;
            core.info(`Watching preview run ${run.id}: ${runUrl}`);
            core.setOutput('preview-run-url', runUrl);
            core.setOutput('preview-url', previewUrl);

      - name: Wait for published preview route
        run: |
          set -euo pipefail
          for attempt in $(seq 1 20); do
            status=$(curl -sSL -o /dev/null -w "%{http_code}" "${{ inputs.preview-url }}/playground")
            if [ "$status" = "200" ]; then
              echo "Preview is serving /playground"
              exit 0
            fi
            echo "Preview not ready yet (HTTP $status); retrying..."
            sleep 15
          done
          echo "Preview never became ready at ${{ inputs.preview-url }}/playground"
          exit 1
