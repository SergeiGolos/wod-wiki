name: Preview Delivery

on:
  workflow_call:
    inputs:
      branch:
        description: Source branch to publish from wod-wiki
        required: true
        type: string
      preview-url:
        description: Published preview base URL
        required: false
        default: https://preview.wod.wiki
        type: string
    outputs:
      preview-url:
        description: Published preview URL
        value: ${{ jobs.publish-preview.outputs.preview-url }}
      preview-run-url:
        description: Companion repository workflow run URL
        value: ${{ jobs.publish-preview.outputs.preview-run-url }}

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish-preview:
    runs-on: ubuntu-22.04
    outputs:
      preview-url: ${{ steps.dispatch.outputs.preview-url }}
      preview-run-url: ${{ steps.dispatch.outputs.preview-run-url }}
    steps:
      - name: Dispatch companion preview deployment and wait for completion
        id: dispatch
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PREVIEW_REPO_PAT }}
          script: |
            const owner = 'SergeiGolos';
            const repo = 'wod-wiki-preview';
            const workflow_id = 'preview.yml';
            const sourceBranch = '${{ inputs.branch }}';
            const previewUrl = '${{ inputs.preview-url }}';
            const dispatchedAt = Date.now();
            const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

            core.info(`Dispatching ${owner}/${repo}:${workflow_id} for source branch ${sourceBranch}`);
            await github.rest.actions.createWorkflowDispatch({
              owner,
              repo,
              workflow_id,
              ref: 'main',
              inputs: { branch: sourceBranch },
            });

            let run = null;
            for (let attempt = 1; attempt <= 20; attempt += 1) {
              await sleep(15000);
              const { data } = await github.rest.actions.listWorkflowRuns({
                owner,
                repo,
                workflow_id,
                event: 'workflow_dispatch',
                per_page: 10,
              });

              run = data.workflow_runs.find((candidate) => {
                const createdAt = new Date(candidate.created_at).getTime();
                return createdAt >= dispatchedAt - 60000;
              });

              if (run) {
                break;
              }
            }

            if (!run) {
              core.setFailed(`Unable to find a ${workflow_id} run in ${owner}/${repo} after dispatch.`);
              return;
            }

            const runUrl = run.html_url;
            core.info(`Watching preview run ${run.id}: ${runUrl}`);
            core.setOutput('preview-run-url', runUrl);
            core.setOutput('preview-url', previewUrl);

            for (let attempt = 1; attempt <= 40; attempt += 1) {
              const { data } = await github.rest.actions.getWorkflowRun({
                owner,
                repo,
                run_id: run.id,
              });

              if (data.status === 'completed') {
                if (data.conclusion !== 'success') {
                  core.setFailed(`Preview deployment failed with conclusion: ${data.conclusion}. ${runUrl}`);
                }
                return;
              }

              await sleep(15000);
            }

            core.setFailed(`Timed out waiting for preview deployment to finish. ${runUrl}`);

      - name: Wait for published preview route
        run: |
          set -euo pipefail
          for attempt in $(seq 1 20); do
            status=$(curl -ksSL -o /dev/null -w "%{http_code}" "${{ inputs.preview-url }}/playground")
            if [ "$status" = "200" ]; then
              echo "Preview is serving /playground"
              exit 0
            fi
            echo "Preview not ready yet (HTTP $status); retrying..."
            sleep 15
          done
          echo "Preview never became ready at ${{ inputs.preview-url }}/playground"
          exit 1

  preview-e2e:
    runs-on: ubuntu-22.04
    needs: [publish-preview]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.x

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bun x playwright install --with-deps chromium

      - name: Run preview E2E
        run: bun x playwright test --config playwright.preview.config.ts
        env:
          CI: true
          PLAYWRIGHT_BASE_URL: ${{ needs.publish-preview.outputs.preview-url }}

      - name: Upload Playwright HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: preview-playwright-report
          path: playwright-report/
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload E2E screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: preview-e2e-screenshots
          path: test-results/
          if-no-files-found: ignore
          retention-days: 14

      - name: Write preview summary
        if: always()
        run: |
          cat <<EOF >> "$GITHUB_STEP_SUMMARY"
          ## Preview delivery summary

          - Preview URL: ${{ needs.publish-preview.outputs.preview-url }}
          - Companion deploy run: ${{ needs.publish-preview.outputs.preview-run-url }}
          EOF
