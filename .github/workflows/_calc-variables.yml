name: calculate-variables

on:
  workflow_call:
    outputs:
      version:
        description: "The semver version (e.g. 1.2.3)"
        value: ${{ jobs.calculate-variables.outputs.version }}
      package-version:
        description: "The version for npm publish (tag: 1.2.3, branch: 1.2.3-dev.sha)"
        value: ${{ jobs.calculate-variables.outputs.package-version }}

jobs:
  calculate-variables:
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.calc.outputs.VERSION }}
      package-version: ${{ steps.calc.outputs.PACKAGE_VERSION }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate version
        id: calc
        run: |
          # Base version from package.json
          BASE=$(node -p "require('./package.json').version")

          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            # Tag push: use the tag as-is (strip leading 'v' if present)
            VERSION="${GITHUB_REF_NAME#v}"
            PACKAGE_VERSION="$VERSION"
          elif [[ "$GITHUB_REF_NAME" == "main" ]]; then
            # Main branch: use package.json version
            VERSION="$BASE"
            PACKAGE_VERSION="$BASE"
          else
            # Feature / dev branch: prerelease suffix with short SHA
            SHA=$(git rev-parse --short HEAD)
            BRANCH=$(echo "$GITHUB_REF_NAME" | sed 's/[^a-zA-Z0-9]/-/g')
            VERSION="$BASE"
            PACKAGE_VERSION="${BASE}-${BRANCH}.${SHA}"
          fi

          echo "VERSION=$VERSION"       >> "$GITHUB_OUTPUT"
          echo "PACKAGE_VERSION=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved: VERSION=$VERSION  PACKAGE_VERSION=$PACKAGE_VERSION"
