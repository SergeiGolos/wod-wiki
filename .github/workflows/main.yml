name: Release – Main

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  verify:
    uses: ./.github/workflows/_verify.yml
    secrets: inherit

  release:
    needs: [verify]
    if: needs.verify.result == 'success'
    uses: ./.github/workflows/_release.yml
    secrets: inherit
