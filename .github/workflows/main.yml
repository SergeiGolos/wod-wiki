name: Release – Main

# Every push to main attempts a release using the version from package.json.
# If the tag already exists at this commit SHA, the release is updated in-place (idempotent).
# If the tag exists at a different SHA, the release job fails — bump package.json before
# merging another change to main to avoid overwriting an existing release.
on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  verify:
    uses: ./.github/workflows/_verify.yml
    secrets: inherit

  release:
    needs: [verify]
    if: needs.verify.result == 'success'
    uses: ./.github/workflows/_release.yml
    secrets: inherit
