name: test-report

# Reusable workflow: runs all test tiers and posts a summary comment on the PR.
# Call from main.yml with: uses: ./.github/workflows/_test-report.yml

on:
  workflow_call:
    inputs:
      storybook-url:
        description: "URL where Storybook is running (leave blank to start it in CI)"
        required: false
        type: string
        default: ""

# Needs write access to post PR comments and upload artifacts
permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  unit:
    name: Unit Tests
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run unit tests with coverage
        run: bun run test:coverage
        continue-on-error: true

      - name: Publish unit test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: "Unit Tests"
          path: "coverage/junit.xml"
          reporter: java-junit
          fail-on-error: false

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  story:
    name: Story Tests (smoke + interaction)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bun x playwright install --with-deps chromium

      - name: Run story tests
        run: bun run test:storybook
        continue-on-error: true

      - name: Publish story test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: "Story Tests"
          path: "test-results/storybook-*.xml"
          reporter: java-junit
          fail-on-error: false

  e2e:
    name: E2E Acceptance Tests
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bun x playwright install --with-deps chromium

      - name: Build Storybook
        run: bun run build-storybook
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Serve Storybook static build
        run: bun x serve storybook-static -p 6006 &
        
      - name: Wait for Storybook
        run: bun x wait-on http://localhost:6006 --timeout 30000

      - name: Run E2E tests
        run: bun run test:e2e
        continue-on-error: true
        env:
          CI: true

      - name: Upload Playwright HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload E2E screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-screenshots
          path: e2e/screenshots/
          retention-days: 14

      - name: Upload test results (JUnit)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-junit
          path: test-results/
          retention-days: 14

      - name: Publish E2E test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: "E2E Tests"
          path: "test-results/*.xml"
          reporter: java-junit
          fail-on-error: false

  pr-comment:
    name: Post PR Summary
    runs-on: ubuntu-22.04
    # Always run, even if test jobs had failures
    if: always() && github.event_name == 'pull_request'
    needs: [unit, story, e2e]
    steps:
      - name: Build report comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const artifactBase = `${runUrl}#artifacts`;

            const status = (result) => result === 'success' ? '✅' : result === 'skipped' ? '⏭️' : '❌';

            const unitStatus   = '${{ needs.unit.result }}';
            const storyStatus  = '${{ needs.story.result }}';
            const e2eStatus    = '${{ needs.e2e.result }}';

            const allGreen = [unitStatus, storyStatus, e2eStatus].every(s => s === 'success');
            const headline = allGreen
              ? '## ✅ All tests passed'
              : '## ⚠️ Some tests need attention';

            const body = `${headline}

            | Tier | Status | Details |
            |------|--------|---------|
            | Unit tests | ${status(unitStatus)} | [Coverage report](${artifactBase}) |
            | Story tests (smoke + interaction) | ${status(storyStatus)} | [Checks tab](${runUrl}) |
            | E2E acceptance tests | ${status(e2eStatus)} | [Playwright report](${artifactBase}) · [Screenshots](${artifactBase}) |

            **[View full Actions run →](${runUrl})**

            <details>
            <summary>How to download the Playwright HTML report</summary>

            1. Click the **Actions run** link above
            2. Scroll to **Artifacts** at the bottom
            3. Download \`playwright-report\`
            4. Unzip and open \`index.html\` locally, or run:
               \`\`\`bash
               bun x playwright show-report path/to/playwright-report
               \`\`\`
            </details>

            > _Generated by [test-report workflow](${runUrl})_`;

            // Find existing bot comment and update it, or create a new one
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Generated by [test-report workflow]')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
