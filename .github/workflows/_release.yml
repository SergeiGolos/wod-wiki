name: Release

on:
  workflow_call:

permissions:
  contents: write
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-22.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate release version is available for this commit
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('./package.json', 'utf8'));
            const tag = pkg.version;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const sha = context.sha;

            try {
              const ref = await github.rest.git.getRef({ owner, repo, ref: `tags/${tag}` });
              if (ref.data.object.sha !== sha) {
                core.setFailed(`Tag ${tag} already exists at ${ref.data.object.sha}. Bump package.json before merging another main release.`);
                return;
              }
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
            }

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.x

      - name: Set up Node.js for npm publication
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Replace GA tag in sources
        if: ${{ vars.G_TAG != '' }}
        run: |
          sed -i 's/G-PROD-ID/${{ vars.G_TAG }}/g' playground/index.html
          sed -i 's/G-PROD-ID/${{ vars.G_TAG }}/g' playground/receiver-rpc.html

      - name: Build playground
        run: bun run build:app
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL || 'https://wod.wiki/api' }}
          VITE_CAST_APP_ID: ${{ vars.VITE_CAST_APP_ID }}

      - name: Build library
        run: bun run build-library

      - name: Upload library artifact
        uses: actions/upload-artifact@v4
        with:
          name: library-dist
          path: dist/
          if-no-files-found: error
          retention-days: 14

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: playground/dist

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Create or update release tag and GitHub release
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('./package.json', 'utf8'));
            const tag = pkg.version;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const sha = context.sha;

            let tagExistsAtSha = false;
            try {
              const ref = await github.rest.git.getRef({ owner, repo, ref: `tags/${tag}` });
              tagExistsAtSha = ref.data.object.sha === sha;
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
            }

            if (!tagExistsAtSha) {
              await github.rest.git.createRef({
                owner,
                repo,
                ref: `refs/tags/${tag}`,
                sha,
              });
            }

            try {
              const existing = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
              await github.rest.repos.updateRelease({
                owner,
                repo,
                release_id: existing.data.id,
                target_commitish: sha,
                name: tag,
                draft: false,
                prerelease: false,
              });
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }

              await github.rest.repos.createRelease({
                owner,
                repo,
                tag_name: tag,
                target_commitish: sha,
                name: tag,
                generate_release_notes: true,
                draft: false,
                prerelease: false,
              });
            }

      - name: Validate npm publication prerequisites
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          node <<'NODE'
          const fs = require('fs');
          const pkg = JSON.parse(fs.readFileSync('./package.json', 'utf8'));

          if (!pkg.name || typeof pkg.name !== 'string') {
            throw new Error('package.json must define a publishable package name.');
          }

          if (!pkg.version || typeof pkg.version !== 'string') {
            throw new Error('package.json must define a publishable version.');
          }

          if (pkg.private) {
            throw new Error('package.json#private=true blocks npm publication.');
          }

          console.log(`Preparing npm publish for ${pkg.name}@${pkg.version}`);
          NODE

          if [ -z "${NPM_TOKEN}" ]; then
            echo "NPM_TOKEN secret is required for release publication." >&2
            exit 1
          fi

      - name: Publish package to npm (idempotent)
        id: npm_publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")

          if npm view "${NAME}@${VERSION}" version >/dev/null 2>&1; then
            echo "published=false" >> "$GITHUB_OUTPUT"
            echo "published_version=${VERSION}" >> "$GITHUB_OUTPUT"
            echo "Package ${NAME}@${VERSION} already exists on npm; skipping publish."
            exit 0
          fi

          npm publish --provenance --access public
          echo "published=true" >> "$GITHUB_OUTPUT"
          echo "published_version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Write release summary
        run: |
          VERSION=$(node -p "require('./package.json').version")
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          cat <<EOF >> "$GITHUB_STEP_SUMMARY"
          ## Release summary

          - Released version: $VERSION
          - Pages URL: ${{ steps.deployment.outputs.page_url }}
          - npm package: ${PACKAGE_NAME}@${{ steps.npm_publish.outputs.published_version }}
          - npm publish executed: ${{ steps.npm_publish.outputs.published }}
          EOF
