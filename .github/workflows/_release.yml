name: Release

on:
  workflow_call:

permissions:
  contents: write
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-22.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute and set next version
        run: |
          # Resolve latest git tag (the most recent semver tag on any branch)
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          if [ -n "$LATEST_TAG" ]; then
            VERSION="${LATEST_TAG#v}"
            MAJOR=$(echo "$VERSION" | cut -d. -f1)
            MINOR=$(echo "$VERSION" | cut -d. -f2)
            echo "Latest tag: $LATEST_TAG  →  MAJOR=$MAJOR  MINOR=$MINOR"
            COMMITS=$(git log "${LATEST_TAG}..HEAD" --format="%s")
          else
            PKG_VERSION=$(node -p "require('./package.json').version")
            MAJOR=$(echo "$PKG_VERSION" | cut -d. -f1)
            MINOR=$(echo "$PKG_VERSION" | cut -d. -f2)
            echo "No tags found; seeding from package.json $PKG_VERSION  →  MAJOR=$MAJOR  MINOR=$MINOR"
            COMMITS=$(git log --format="%s")
          fi

          # Determine version bump from conventional commit prefixes
          # breaking: → major  |  feature: → minor  |  fix: (or anything else) → patch only
          BUMP="patch"
          if echo "$COMMITS" | grep -qiE "^breaking[:(]"; then
            BUMP="major"
          elif echo "$COMMITS" | grep -qiE "^feature[:(]"; then
            BUMP="minor"
          fi
          echo "Detected bump: $BUMP"

          # Apply bump; PATCH is always the GitHub Actions run number for uniqueness
          if [ "$BUMP" = "major" ]; then
            MAJOR=$((MAJOR + 1))
            MINOR=0
          elif [ "$BUMP" = "minor" ]; then
            MINOR=$((MINOR + 1))
          fi

          NEW_VERSION="${MAJOR}.${MINOR}.${{ github.run_number }}"
          echo "New version: $NEW_VERSION"

          # Write back to package.json so all downstream steps pick it up
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('./package.json', 'utf8'));
            pkg.version = '${NEW_VERSION}';
            fs.writeFileSync('./package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          echo "package.json updated to $NEW_VERSION"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.x

      - name: Set up Node.js for npm publication
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Replace GA tag in sources
        if: ${{ vars.G_TAG != '' }}
        run: |
          sed -i 's/G-PROD-ID/${{ vars.G_TAG }}/g' playground/index.html
          sed -i 's/G-PROD-ID/${{ vars.G_TAG }}/g' playground/receiver-rpc.html

      - name: Build playground
        run: bun run build:app
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL || 'https://wod.wiki/api' }}
          VITE_CAST_APP_ID: ${{ vars.VITE_CAST_APP_ID }}

      - name: Build library
        run: bun run build-library

      - name: Upload library artifact
        uses: actions/upload-artifact@v4
        with:
          name: library-dist
          path: dist/
          if-no-files-found: error
          retention-days: 14

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: playground/dist

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Create or update release tag and GitHub release
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('./package.json', 'utf8'));
            const tag = pkg.version;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const sha = context.sha;

            let tagExistsAtSha = false;
            try {
              const ref = await github.rest.git.getRef({ owner, repo, ref: `tags/${tag}` });
              tagExistsAtSha = ref.data.object.sha === sha;
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
            }

            if (!tagExistsAtSha) {
              await github.rest.git.createRef({
                owner,
                repo,
                ref: `refs/tags/${tag}`,
                sha,
              });
            }

            try {
              const existing = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
              await github.rest.repos.updateRelease({
                owner,
                repo,
                release_id: existing.data.id,
                target_commitish: sha,
                name: tag,
                draft: false,
                prerelease: false,
              });
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }

              await github.rest.repos.createRelease({
                owner,
                repo,
                tag_name: tag,
                target_commitish: sha,
                name: tag,
                generate_release_notes: true,
                draft: false,
                prerelease: false,
              });
            }

      - name: Validate npm publication prerequisites
        if: false  # Temporarily disabled per board decision (WOD-436)
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          node <<'NODE'
          const fs = require('fs');
          const pkg = JSON.parse(fs.readFileSync('./package.json', 'utf8'));

          if (!pkg.name || typeof pkg.name !== 'string') {
            throw new Error('package.json must define a publishable package name.');
          }

          if (!pkg.version || typeof pkg.version !== 'string') {
            throw new Error('package.json must define a publishable version.');
          }

          if (pkg.private) {
            throw new Error('package.json#private=true blocks npm publication.');
          }

          console.log(`Preparing npm publish for ${pkg.name}@${pkg.version}`);
          NODE

          if [ -z "${NPM_TOKEN}" ]; then
            echo "NPM_TOKEN secret is required for release publication." >&2
            exit 1
          fi

      - name: Publish package to npm (idempotent)
        if: false  # Temporarily disabled per board decision (WOD-436)
        id: npm_publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")

          if npm view "${NAME}@${VERSION}" version >/dev/null 2>&1; then
            echo "published=false" >> "$GITHUB_OUTPUT"
            echo "published_version=${VERSION}" >> "$GITHUB_OUTPUT"
            echo "Package ${NAME}@${VERSION} already exists on npm; skipping publish."
            exit 0
          fi

          npm publish --provenance --access public
          echo "published=true" >> "$GITHUB_OUTPUT"
          echo "published_version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Write release summary
        run: |
          VERSION=$(node -p "require('./package.json').version")
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          cat <<EOF >> "$GITHUB_STEP_SUMMARY"
          ## Release summary

          - Released version: $VERSION
          - Pages URL: ${{ steps.deployment.outputs.page_url }}
          - Package name: ${PACKAGE_NAME}
          - npm publish: temporarily disabled (see WOD-436)
          EOF
