<!-- Google Analytics -->
<!-- Google tag (gtag.js) -->
<!-- Dev placeholder G-PROD-ID is replaced during production build -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-PROD-ID"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());


  gtag('config', 'G-PROD-ID');

  // Track Storybook-specific events
  window.addEventListener('storybook/story-rendered', () => {
    gtag('event', 'story_rendered', {
      'story_id': window.location.pathname
    });

    // Attempt to ensure the iframe allows presentation
    try {
        if (window.frameElement) {
            window.frameElement.setAttribute('allow', (window.frameElement.getAttribute('allow') || '') + ' presentation');
            console.info('[Storybook Patch] Added allow="presentation" to preview iframe');
        }
    } catch (e) {
        // May fail due to cross-origin restrictions in some setups
    }
  });
</script>
